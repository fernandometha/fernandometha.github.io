<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบกำลังปรับปรุง</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&amp;family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(3deg); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 0; }
      100% { transform: scale(0.8); opacity: 0; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-pulse-ring { animation: pulse-ring 2s ease-out infinite; }
    .animate-fade-up { animation: fade-up 0.8s ease-out both; }
    .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    .dot-1 { animation: dot-bounce 1.4s infinite 0s; }
    .dot-2 { animation: dot-bounce 1.4s infinite 0.2s; }
    .dot-3 { animation: dot-bounce 1.4s infinite 0.4s; }

    .gear-orbit {
      animation: spin-slow 12s linear infinite reverse;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full" style="font-family: 'Noto Sans Thai', 'Outfit', sans-serif;">
  <div id="app" class="h-full w-full overflow-auto flex items-center justify-center relative" style="background: #0f172a;"><!-- Animated background shapes -->
   <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-72 h-72 rounded-full opacity-10 animate-float" style="background: radial-gradient(circle, #6366f1, transparent); filter: blur(60px);"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 rounded-full opacity-10 animate-float" style="background: radial-gradient(circle, #06b6d4, transparent); filter: blur(80px); animation-delay: -3s;"></div>
    <div class="absolute top-1/2 left-1/2 w-64 h-64 rounded-full opacity-5" style="background: radial-gradient(circle, #f59e0b, transparent); filter: blur(50px); animation: float 8s ease-in-out infinite -2s;"></div>
   </div><!-- Main content -->
   <div class="relative z-10 text-center px-6 max-w-xl mx-auto"><!-- Icon cluster -->
    <div class="animate-fade-up relative w-40 h-40 mx-auto mb-10" style="animation-delay: 0s;"><!-- Pulse rings -->
     <div class="absolute inset-0 rounded-full animate-pulse-ring" style="border: 2px solid #6366f1;"></div>
     <div class="absolute inset-0 rounded-full animate-pulse-ring" style="border: 2px solid #06b6d4; animation-delay: 0.7s;"></div><!-- Center icon -->
     <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-28 h-28 rounded-3xl flex items-center justify-center animate-float" style="background: linear-gradient(135deg, #6366f1, #06b6d4); box-shadow: 0 20px 60px rgba(99,102,241,0.3);"><i data-lucide="wrench" style="width: 48px; height: 48px; color: #fff;"></i>
      </div>
     </div><!-- Orbiting gear -->
     <div class="absolute inset-0 gear-orbit">
      <div class="absolute -top-3 left-1/2 -translate-x-1/2" style="color: #6366f1; opacity: 0.6;"><i data-lucide="settings" style="width: 24px; height: 24px;"></i>
      </div>
     </div>
    </div><!-- Text -->
    <h1 id="main-title" class="text-3xl md:text-4xl font-bold mb-4 animate-fade-up" style="color: #e2e8f0; animation-delay: 0.2s;">ระบบกำลังปรับปรุง</h1>
    <p id="sub-message" class="text-lg md:text-xl font-light mb-3 animate-fade-up" style="color: #94a3b8; animation-delay: 0.35s;">จะพร้อมใช้งานในไม่ช้านี้</p>
    <p id="apology-text" class="text-base animate-fade-up" style="color: #64748b; animation-delay: 0.5s;">ขออภัยในความไม่สะดวก</p><!-- Loading dots -->
    <div class="flex items-center justify-center gap-2 mt-8 animate-fade-up" style="animation-delay: 0.65s;">
     <div class="w-2.5 h-2.5 rounded-full dot-1" style="background: #6366f1;"></div>
     <div class="w-2.5 h-2.5 rounded-full dot-2" style="background: #818cf8;"></div>
     <div class="w-2.5 h-2.5 rounded-full dot-3" style="background: #06b6d4;"></div>
    </div><!-- Progress bar -->
    <div class="mt-10 animate-fade-up" style="animation-delay: 0.8s;">
     <div class="w-full h-1.5 rounded-full overflow-hidden" style="background: #1e293b;">
      <div class="h-full rounded-full" style="background: linear-gradient(90deg, #6366f1, #06b6d4); width: 65%; animation: pulse-ring 3s ease-in-out infinite; animation-name: none;">
       <div class="h-full w-full rounded-full" style="background: linear-gradient(90deg, #6366f1, #06b6d4); animation: shimmer 2s ease-in-out infinite;"></div>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
    lucide.createIcons();

    const defaultConfig = {
      main_title: 'ระบบกำลังปรับปรุง',
      sub_message: 'จะพร้อมใช้งานในไม่ช้านี้',
      apology_text: 'ขออภัยในความไม่สะดวก',
      background_color: '#0f172a',
      surface_color: '#6366f1',
      text_color: '#e2e8f0',
      accent_color: '#06b6d4',
      muted_color: '#64748b',
      font_family: 'Noto Sans Thai',
      font_size: 16
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = { ...defaultConfig, ...config };
        
        document.getElementById('main-title').textContent = c.main_title;
        document.getElementById('sub-message').textContent = c.sub_message;
        document.getElementById('apology-text').textContent = c.apology_text;

        const app = document.getElementById('app');
        app.style.background = c.background_color;

        document.getElementById('main-title').style.color = c.text_color;
        document.getElementById('sub-message').style.color = c.muted_color;
        document.getElementById('apology-text').style.color = c.muted_color;

        const font = `${c.font_family}, 'Outfit', sans-serif`;
        document.body.style.fontFamily = font;

        const base = c.font_size;
        document.getElementById('main-title').style.fontSize = `${base * 2.2}px`;
        document.getElementById('sub-message').style.fontSize = `${base * 1.25}px`;
        document.getElementById('apology-text').style.fontSize = `${base}px`;
      },
      mapToCapabilities: (config) => {
        const c = { ...defaultConfig, ...config };
        const color = (key) => ({
          get: () => c[key],
          set: (v) => { c[key] = v; window.elementSdk.setConfig({ [key]: v }); }
        });
        return {
          recolorables: [
            color('background_color'),
            color('surface_color'),
            color('text_color'),
            color('accent_color'),
            color('muted_color')
          ],
          borderables: [],
          fontEditable: {
            get: () => c.font_family,
            set: (v) => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => c.font_size,
            set: (v) => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        };
      },
      mapToEditPanelValues: (config) => {
        const c = { ...defaultConfig, ...config };
        return new Map([
          ['main_title', c.main_title],
          ['sub_message', c.sub_message],
          ['apology_text', c.apology_text]
        ]);
      }
    });
  </script>

</html>
