<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Z English Sounds for M.1</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6C63FF; /* Modern Purple */
            --secondary: #4CC9F0; /* Cyan */
            --accent: #FF6584; /* Pink */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --text-main: #2D3436;
            --text-light: #636e72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Container */
        .app-container {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Slide Content Area */
        .slide-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Typography */
        h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            text-align: center;
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #fff;
            opacity: 0.9;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Card Grid System */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .letter-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-bottom: 4px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .letter-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .letter-big {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }

        .thai-sound {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            background: #eee;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .ipa-sound {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 5px;
            display: block;
        }

        /* Special Highlight Box (Slide 5) */
        .highlight-box {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            margin-bottom: 20px;
            border-left: 10px solid var(--accent);
        }

        .checklist {
            list-style: none;
            text-align: left;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
        }

        .checklist li {
            margin-bottom: 10px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .checklist i {
            color: #2ecc71;
            margin-right: 10px;
        }

        /* Navigation Controls */
        .controls {
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .nav-btn {
            background: #fff;
            color: var(--primary);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: #fff;
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .indicators {
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #fff;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                width: 95%;
                height: 90vh;
            }
            h1 { font-size: 1.8rem; }
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .letter-card { padding: 10px; }
            .letter-big { font-size: 2rem; }
            .controls { padding: 0 20px; }
            .nav-btn { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Slide Content -->
        <div class="slide-content" id="slideContent">
            <!-- Content will be injected here by JS -->
        </div>

        <!-- Navigation -->
        <div class="controls">
            <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">
                <i class="fas fa-arrow-left"></i>
            </button>
            
            <div class="indicators" id="indicators">
                <!-- Dots will be injected here -->
            </div>

            <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <script>
        // --- Data Structure (JSON) ---
        const slidesData = [
            {
                type: "intro",
                title: "A-Z English Sounds",
                subtitle: "รู้จักตัวอักษรและเสียงพื้นฐาน เทียบเสียงไทย",
                icon: "🎓📘",
                objectives: [
                    "จำตัวอักษร A-Z ได้แม่นยำ",
                    "ออกเสียงพยัญชนะภาษาอังกฤษถูกต้อง",
                    "เทียบเสียงกับภาษาไทยเพื่อช่วยจำ"
                ]
            },
            {
                type: "grid",
                title: "กลุ่มเสียงหนัก (Hard Consonants)",
                desc: "เสียงเหล่านี้มักออกเสียงชัดเจน เทียบกับพยัญชนะไทยได้ใกล้เคียง",
                items: [
                    { char: "B", thai: "บ", ipa: "/b/" },
                    { char: "C", thai: "ค/ซ", ipa: "/k/ or /s/" },
                    { char: "D", thai: "ด", ipa: "/d/" },
                    { char: "G", thai: "ก", ipa: "/g/" },
                    { char: "K", thai: "ค", ipa: "/k/" },
                    { char: "P", thai: "พ", ipa: "/p/" },
                    { char: "T", thai: "ท", ipa: "/t/" }
                ]
            },
            {
                type: "grid",
                title: "กลุ่มเสียงทั่วไป (General Sounds)",
                desc: "เสียงที่พบบ่อยในภาษาอังกฤษ ฝึกออกเสียงให้ชัด",
                items: [
                    { char: "F", thai: "ฟ", ipa: "/f/" },
                    { char: "H", thai: "ฮ", ipa: "/h/" },
                    { char: "J", thai: "จ", ipa: "/dʒ/" },
                    { char: "L", thai: "ล", ipa: "/l/" },
                    { char: "M", thai: "ม", ipa: "/m/" },
                    { char: "N", thai: "น", ipa: "/n/" },
                    { char: "S", thai: "ส", ipa: "/s/" }
                ]
            },
            {
                type: "grid",
                title: "กลุ่มเสียงเพิ่มเติม (Complex Sounds)",
                desc: "กลุ่มเสียงที่ต้องระวังการออกเสียง",
                items: [
                    { char: "R", thai: "ร (ม้วนลิ้น)", ipa: "/r/" },
                    { char: "V", thai: "ว (กัดฟัน)", ipa: "/v/" },
                    { char: "W", thai: "ว (ห่อปาก)", ipa: "/w/" },
                    { char: "X", thai: "กซ", ipa: "/ks/" },
                    { char: "Y", thai: "ย", ipa: "/j/" },
                    { char: "Z", thai: "ซ (สั่น)", ipa: "/z/" }
                ]
            },
            {
                type: "special",
                title: "เสียงพิเศษ & สรุปบทเรียน",
                content: `
                    <div class="highlight-box">
                        <h3 style="color:var(--accent); margin-bottom:10px;">⚠️ เสียง TH (The / Think)</h3>
                        <p style="font-size:1.1rem;">
                            เสียงนี้ไม่มีในภาษาไทย!<br>
                            <strong>วิธีทำ:</strong> ให้เอาปลายลิ้น <u>แตะขอบฟันหน้าบน</u> แล้วเป่าลมออกมา
                        </p>
                        <div style="font-size:2rem; margin-top:10px;">👅🦷💨</div>
                    </div>
                    
                    <ul class="checklist">
                        <li><i class="fas fa-check-circle"></i> รู้จักตัวอักษร A-Z ครบแล้ว</li>
                        <li><i class="fas fa-check-circle"></i> รู้วิธีเทียบเสียงไทย-อังกฤษ</li>
                        <li><i class="fas fa-check-circle"></i> พร้อมฝึกอ่านคำศัพท์ต่อไป!</li>
                    </ul>
                `
            }
        ];

        // --- State Management ---
        let currentSlideIndex = 0;

        // --- DOM Elements ---
        const slideContent = document.getElementById('slideContent');
        const progressBar = document.getElementById('progressBar');
        const indicatorsContainer = document.getElementById('indicators');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // --- Initialization ---
        function init() {
            createIndicators();
            renderSlide(currentSlideIndex);
            updateControls();
        }

        // --- Render Functions ---
        function createIndicators() {
            indicatorsContainer.innerHTML = '';
            slidesData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                if (index === 0) dot.classList.add('active');
                indicatorsContainer.appendChild(dot);
            });
        }

        function updateIndicators() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if (index === currentSlideIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function updateControls() {
            prevBtn.disabled = currentSlideIndex === 0;
            nextBtn.disabled = currentSlideIndex === slidesData.length - 1;
            
            // Update Progress Bar
            const progress = ((currentSlideIndex + 1) / slidesData.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function renderSlide(index) {
            // Animation Reset
            slideContent.innerHTML = '';
            slideContent.classList.remove('fade-in');
            void slideContent.offsetWidth; // Trigger reflow
            slideContent.classList.add('fade-in');

            const data = slidesData[index];

            if (data.type === 'intro') {
                slideContent.innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 20px;">${data.icon}</div>
                    <h1>${data.title}</h1>
                    <p class="subtitle">${data.subtitle}</p>
                    <div style="background: rgba(255,255,255,0.9); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px;">
                        <h3 style="color: var(--primary); margin-bottom: 15px;">🎯 สิ่งที่จะได้เรียนรู้:</h3>
                        <ul style="text-align: left; padding-left: 20px; font-size: 1.1rem; line-height: 1.8;">
                            ${data.objectives.map(obj => `<li>${obj}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } 
            else if (data.type === 'grid') {
                let cardsHTML = data.items.map(item => `
                    <div class="letter-card">
                        <span class="letter-big">${item.char}</span>
                        <span class="thai-sound">${item.thai}</span>
                        <span class="ipa-sound">${item.ipa}</span>
                    </div>
                `).join('');

                slideContent.innerHTML = `
                    <h2>${data.title}</h2>
                    <p class="subtitle">${data.desc}</p>
                    <div class="grid-container">
                        ${cardsHTML}
                    </div>
                `;
            }
            else if (data.type === 'special') {
                slideContent.innerHTML = `
                    <h2>${data.title}</h2>
                    <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
                        ${data.content}
                    </div>
                `;
            }

            updateControls();
            updateIndicators();
        }

        // --- Navigation Logic ---
        function changeSlide(direction) {
            const newIndex = currentSlideIndex + direction;
            if (newIndex >= 0 && newIndex < slidesData.length) {
                currentSlideIndex = newIndex;
                renderSlide(currentSlideIndex);
            }
        }

        // --- Start App ---
        init();

    </script>
</body>
</html>
