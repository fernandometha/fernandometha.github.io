<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ห้องเรียนออนไลน์ครูเมธา</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700;800&amp;family=Outfit:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-fade-up { animation: fadeUp 0.8s ease-out forwards; }
    .animate-scale-in { animation: scaleIn 0.6s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .btn-shimmer {
      background-size: 200% auto;
      background-image: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      animation: shimmer 3s linear infinite;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="w-full h-full overflow-auto relative flex flex-col items-center justify-center" style="background: #0f172a; font-family: 'Noto Sans Thai', 'Outfit', sans-serif;"><!-- Orbs -->
   <div class="orb" style="width:400px;height:400px;background:#6366f1;top:-100px;left:-100px;"></div>
   <div class="orb" style="width:350px;height:350px;background:#06b6d4;bottom:-80px;right:-80px;"></div>
   <div class="orb" style="width:250px;height:250px;background:#a855f7;top:40%;left:60%;"></div><!-- Grid pattern -->
   <div class="absolute inset-0 opacity-[0.04]" style="background-image: linear-gradient(rgba(255,255,255,.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.5) 1px, transparent 1px); background-size: 60px 60px;"></div>
   <main class="relative z-10 flex flex-col items-center justify-center px-6 py-12 text-center max-w-3xl mx-auto"><!-- Logo -->
    <div class="animate-scale-in animate-float mb-8">
     <div class="rounded-3xl p-2 bg-white/10 backdrop-blur-sm border border-white/10 shadow-2xl"><img id="logo" src="https://krutopit.wordpress.com/wp-content/uploads/2025/02/kutopit-logo300-2.png" alt="โลโก้ห้องเรียนออนไลน์ครูเมธา" loading="lazy" class="w-28 h-28 sm:w-36 sm:h-36 rounded-2xl object-contain" onerror="console.error('Image failed to load:', this.src); this.style.background='linear-gradient(135deg,#6366f1,#06b6d4)'; this.alt='โลโก้ไม่สามารถโหลดได้';">
     </div>
    </div><!-- Welcome Text -->
    <h1 id="welcomeText" class="animate-fade-up delay-1 text-2xl sm:text-4xl lg:text-5xl font-bold leading-relaxed" style="color: #e2e8f0;">ยินดีต้อนรับเข้าสู่แพลตฟอร์มการเรียนรู้ของห้องเรียนออนไลน์ครูเมธา</h1>
    <p class="animate-fade-up delay-2 mt-5 text-base sm:text-lg max-w-xl" style="color: #94a3b8;">เริ่มต้นการเรียนรู้ที่ไม่มีขีดจำกัด พร้อมเนื้อหาคุณภาพที่ออกแบบมาเพื่อคุณ</p><!-- Button -->
    <div class="animate-fade-up delay-3 mt-10"><a id="ctaButton" href="https://krutopit.wordpress.com/" target="_blank" rel="noopener noreferrer" class="group relative inline-flex items-center gap-3 px-8 py-4 rounded-2xl text-lg font-semibold text-white shadow-lg transition-all duration-300 hover:scale-105 hover:shadow-2xl" style="background: linear-gradient(135deg, #6366f1, #06b6d4);"> <span class="btn-shimmer absolute inset-0 rounded-2xl"></span> <span id="buttonLabel" class="relative z-10">เข้าสู่ห้องเรียน</span> <i data-lucide="arrow-right" class="relative z-10 w-5 h-5 transition-transform group-hover:translate-x-1"></i> </a>
    </div>
   </main><!-- Footer -->
   <footer class="relative z-10 pb-6 text-center" style="color: #475569;">
    <p class="text-sm">© 2025 ห้องเรียนออนไลน์ครูเมธา</p>
   </footer>
  </div>
  <script>
    lucide.createIcons();

    const defaultConfig = {
      welcome_text: 'ยินดีต้อนรับเข้าสู่แพลตฟอร์มการเรียนรู้ของห้องเรียนออนไลน์ครูเมธา',
      button_text: 'เข้าสู่ห้องเรียน',
      background_color: '#0f172a',
      surface_color: '#6366f1',
      text_color: '#e2e8f0',
      accent_color: '#06b6d4',
      secondary_text_color: '#94a3b8',
      font_family: 'Noto Sans Thai',
      font_size: 16
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      const font = `${c.font_family}, 'Outfit', sans-serif`;
      const base = c.font_size;

      document.getElementById('welcomeText').textContent = c.welcome_text;
      document.getElementById('welcomeText').style.color = c.text_color;
      document.getElementById('welcomeText').style.fontFamily = font;
      document.getElementById('welcomeText').style.fontSize = `${base * 2.2}px`;

      document.getElementById('buttonLabel').textContent = c.button_text;
      document.getElementById('ctaButton').style.background = `linear-gradient(135deg, ${c.surface_color}, ${c.accent_color})`;
      document.getElementById('ctaButton').style.fontFamily = font;
      document.getElementById('ctaButton').style.fontSize = `${base * 1.1}px`;

      document.getElementById('app-wrapper').style.background = c.background_color;
      document.getElementById('app-wrapper').style.fontFamily = font;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.secondary_text_color || defaultConfig.secondary_text_color, set: (v) => { config.secondary_text_color = v; window.elementSdk.setConfig({ secondary_text_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['welcome_text', config.welcome_text || defaultConfig.welcome_text],
        ['button_text', config.button_text || defaultConfig.button_text]
      ])
    });
  </script>

</html>
